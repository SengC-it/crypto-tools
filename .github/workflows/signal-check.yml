name: Signal Check

on:
  schedule:
    # Every 4h at :15 past — aligned with 4h candle closes (00/04/08/12/16/20 UTC)
    # +15min buffer for Binance data to settle
    # 6 runs/day × 30 = 180 min/month, well within GitHub 2000 min free tier
    - cron: '15 */4 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Cron
        run: |
          curl -sS -f "${{ secrets.VERCEL_CRON_URL }}"
        env:
          VERCEL_CRON_URL: ${{ secrets.VERCEL_CRON_URL }}
